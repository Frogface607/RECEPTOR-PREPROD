name: Golden Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  golden:
    runs-on: ubuntu-latest
    name: "Golden TechCard Tests"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pydantic==2.5.0 xlsxwriter==3.1.9
        
    - name: Run Golden Tests
      run: |
        python golden_tests.py
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: golden-test-results
        path: |
          *.log
          golden/
        retention-days: 30

  # Этот джоб блокирует merge если golden тесты падают
  require-golden-pass:
    runs-on: ubuntu-latest
    needs: golden
    if: always()
    
    steps:
    - name: Check Golden Tests Status
      run: |
        if [ "${{ needs.golden.result }}" != "success" ]; then
          echo "❌ Golden tests failed - blocking merge"
          exit 1
        else
          echo "✅ Golden tests passed - merge allowed"
        fi